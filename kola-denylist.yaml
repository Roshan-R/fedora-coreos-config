# This file documents currently known-to-fail kola tests. It is consumed by
# coreos-assembler to automatically skip some tests. For more information,
# see: https://github.com/coreos/coreos-assembler/pull/866.
- pattern: coreos.boot-mirror*
  tracker: https://github.com/coreos/fedora-coreos-tracker/issues/1659
  warn: true
  arches:
    - ppc64le
- pattern: skip-console-warnings
  tracker: https://github.com/coreos/fedora-coreos-tracker/issues/1889
  arches:
    - ppc64le
- pattern: fcos.ignition.v3.noop
  tracker: https://github.com/coreos/fedora-coreos-tracker/issues/2021
  snooze: 2025-09-29
  warn: true
  platforms:
    - azure
- pattern: fcos.ignition.misc.empty
  tracker: https://github.com/coreos/fedora-coreos-tracker/issues/2021
  snooze: 2025-09-29
  warn: true
  platforms:
    - azure
- pattern: coreos.unique.boot.failure
  tracker: https://github.com/coreos/fedora-coreos-tracker/issues/2019
  snooze: 2025-09-29
  warn: true
  arches:
    - aarch64
