---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/on-push
transformers:
  - |-
    apiVersion: builtin
    kind: PrefixSuffixTransformer
    metadata:
      name: SuffixTransformer
    suffix: "-stable"
    fieldSpecs:
    - kind: PipelineRun
      path: metadata/labels/appstudio.openshift.io\/application
    - kind: PipelineRun
      path: metadata/labels/appstudio.openshift.io\/component
    - kind: PipelineRun
      path: spec/taskRunTemplate/serviceAccountName
patches:
  - target:
      kind: PipelineRun
    patch: |-
      - op: replace
        path: /metadata/name
        value: 'fedora-coreos-stable-on-push'
      - op: replace
        path: /metadata/annotations/pipelinesascode.tekton.dev~1on-cel-expression
        value: 'event == "push" && target_branch == "stable" && !("ci/buildroot/**".pathChanged())'

